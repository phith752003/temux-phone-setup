<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShortLink — Dịch vụ Rút gọn Link Cao Cấp</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --color-accent: #6366f1; /* Indigo 500 */
        }
        body {
            @apply bg-zinc-950 text-zinc-100 antialiased min-h-[100dvh] flex flex-col justify-center relative overflow-hidden;
            background-image: 
                radial-gradient(circle at top center, rgba(99, 102, 241, 0.08), transparent 40%);
        }
        
        .glass-card {
            @apply w-full max-w-2xl mx-auto bg-zinc-900/40 backdrop-blur-2xl border border-white/5 rounded-3xl p-8 md:p-12 shadow-2xl relative z-10;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-hero {
            @apply w-full bg-zinc-900/80 border border-zinc-800 rounded-2xl pl-6 pr-32 py-4 text-zinc-100 font-mono text-lg transition-all focus:outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 placeholder-zinc-600 shadow-inner;
        }

        .btn-primary {
            @apply absolute right-2 top-2 bottom-2 bg-indigo-500 hover:bg-indigo-400 text-zinc-950 font-bold px-6 rounded-xl transition-transform active:scale-95 flex items-center justify-center;
        }
    </style>
</head>
<body>

    <!-- Subtle animated background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/20 rounded-full blur-[120px] mix-blend-screen opacity-50 animate-pulse pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-[120px] mix-blend-screen opacity-50 pointer-events-none"></div>

    <main class="w-full px-6 z-10">
        <div class="text-center mb-12 gsap-reveal">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-medium mb-6">
                <i class="ph-bold ph-link-simple"></i>
                ShortLink Service
            </div>
            <h1 class="text-5xl md:text-6xl font-bold tracking-tighter leading-tight mb-4 text-zinc-50">
                Rút gọn kết nối. <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Mở rộng tầm vóc.</span>
            </h1>
            <p class="text-lg text-zinc-400">Đơn giản, tốc độ, và hoàn toàn miễn phí cho Homelab.</p>
        </div>

        <div class="glass-card gsap-reveal" style="animation-delay: 0.2s">
            <form id="shorten-form" onsubmit="event.preventDefault(); submitUrl();" class="relative">
                <input type="url" id="url-input" class="input-hero" placeholder="Dán link dài vào đây (https://...)" required autocomplete="off">
                <button type="submit" class="btn-primary" id="submit-btn">
                    <span id="btn-text">Rút gọn</span>
                    <i id="btn-icon" class="ph-bold ph-magic-wand ml-2"></i>
                </button>
            </form>

            <!-- Advanced Options Toggle -->
            <div class="mt-6 flex justify-end">
                <button onclick="document.getElementById('advanced-options').classList.toggle('hidden')" class="text-sm text-zinc-500 hover:text-indigo-400 transition-colors flex items-center gap-1 font-medium">
                    Tùy chỉnh link <i class="ph-bold ph-caret-down"></i>
                </button>
            </div>

            <!-- Advanced Options -->
            <div id="advanced-options" class="hidden mt-4 pt-4 border-t border-white/5">
                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest mb-2">Alias (Tùy chọn)</label>
                <div class="flex items-center border border-zinc-800 bg-zinc-900/50 rounded-xl overflow-hidden focus-within:border-indigo-500/50 transition-colors">
                    <span class="px-4 text-zinc-500 font-mono text-sm border-r border-zinc-800">s.phith.click/</span>
                    <input type="text" id="custom-code" class="flex-1 bg-transparent border-none outline-none px-4 py-3 font-mono text-zinc-200" placeholder="my-custom-link">
                </div>
            </div>

            <!-- Result Box -->
            <div id="result-box" class="hidden mt-8 p-6 bg-zinc-950/50 border border-indigo-500/30 rounded-2xl text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2">Link đã sẵn sàng</div>
                <a href="#" target="_blank" id="short-url" class="text-2xl font-mono text-zinc-100 hover:text-indigo-300 transition-colors break-all">https://s.phith.click/abcd</a>
                <button onclick="copyLink()" class="mt-4 px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm font-medium transition-colors inline-flex items-center gap-2">
                    <i class="ph-bold ph-copy"></i> Copy Link
                </button>
            </div>

            <!-- Error Box -->
            <div id="error-box" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm text-center">
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-zinc-800 border border-zinc-700 text-white px-4 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2">
        <i class="ph-fill ph-check-circle text-emerald-400"></i>
        <span id="toast-msg">Đã copy</span>
    </div>

    <script>
        gsap.fromTo(".gsap-reveal", 
            { y: 40, opacity: 0 }, 
            { y: 0, opacity: 1, duration: 1, stagger: 0.15, ease: "power3.out" }
        );

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
            document.getElementById('result-box').classList.add('hidden');
        }

        async function submitUrl() {
            const longUrl = document.getElementById('url-input').value;
            const customCode = document.getElementById('custom-code').value;
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            // Loading state
            btnText.innerText = "Đang xử lý...";
            btnIcon.className = "ph-bold ph-spinner animate-spin ml-2";
            document.getElementById('error-box').classList.add('hidden');

            try {
                // Pointing to the Public API
                const payload = { long_url: longUrl };
                if (customCode) payload.custom_code = customCode;

                const response = await fetch('http://localhost:3001/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Đã có lỗi xảy ra");
                }

                // Success
                document.getElementById('short-url').innerText = data.short_url;
                document.getElementById('short-url').href = data.short_url;
                document.getElementById('result-box').classList.remove('hidden');
                
            } catch (err) {
                showError(err.message);
            } finally {
                // Reset state
                btnText.innerText = "Rút gọn";
                btnIcon.className = "ph-bold ph-magic-wand ml-2";
            }
        }

        async function copyLink() {
            const link = document.getElementById('short-url').innerText;
            try {
                await navigator.clipboard.writeText(link);
                showToast('Đã copy link!');
            } catch (err) {
                alert('Copy failed');
            }
        }
    </script>
</body>
</html>
