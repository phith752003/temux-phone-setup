<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base64 Encode/Decode | PhiTools</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --color-accent: #00f2fe;
        }
        body {
            @apply bg-zinc-950 text-zinc-100 antialiased h-[100dvh] flex flex-col overflow-hidden;
        }
        .code-area {
            @apply w-full h-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 text-zinc-300 font-mono text-sm resize-none focus:outline-none focus:border-accent/50 focus:bg-zinc-900 transition-colors;
        }
        .topnav { @apply border-b border-white/5 bg-zinc-950/80 backdrop-blur-xl shrink-0; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body>

    <nav class="topnav">
        <div class="max-w-screen-2xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2 text-zinc-400 hover:text-zinc-100 transition-colors group">
                <i class="ph ph-arrow-left transition-transform group-hover:-translate-x-1"></i>
                <span class="font-medium text-sm">Về trang chủ</span>
            </a>
            <div class="font-bold text-lg tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#00f2fe] to-[#4facfe]">Base64 Tool</div>
        </div>
    </nav>

    <main class="flex-1 max-w-screen-2xl mx-auto w-full p-6 flex flex-col md:flex-row gap-6 relative">
        
        <!-- Left: Plain Text -->
        <div class="flex-1 flex flex-col gap-3 min-h-0 relative">
            <div class="flex justify-between items-center shrink-0">
                <label class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Plain Text</label>
                <button onclick="clearText('plain-input')" class="text-xs text-zinc-500 hover:text-red-400 transition-colors"><i class="ph ph-trash"></i> Clear</button>
            </div>
            <textarea id="plain-input" class="code-area flex-1" placeholder="Nhập văn bản thường vào đây..."></textarea>
            <button onclick="copyText('plain-input')" class="absolute bottom-4 right-4 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 p-2 rounded-lg transition-colors" title="Copy"><i class="ph ph-copy"></i></button>
        </div>

        <!-- Center: Actions -->
        <div class="flex md:flex-col justify-center gap-4 shrink-0 py-4 md:py-0 z-10">
            <button onclick="encode()" class="w-12 h-12 rounded-full bg-zinc-800 border border-zinc-700 hover:border-accent hover:text-accent flex items-center justify-center transition-all group" title="Encode to Base64">
                <i class="ph-bold ph-caret-right md:block hidden group-hover:translate-x-0.5 transition-transform"></i>
                <i class="ph-bold ph-caret-down md:hidden block group-hover:translate-y-0.5 transition-transform"></i>
            </button>
            <button onclick="decode()" class="w-12 h-12 rounded-full bg-zinc-800 border border-zinc-700 hover:border-purple-400 hover:text-purple-400 flex items-center justify-center transition-all group" title="Decode from Base64">
                <i class="ph-bold ph-caret-left md:block hidden group-hover:-translate-x-0.5 transition-transform"></i>
                <i class="ph-bold ph-caret-up md:hidden block group-hover:-translate-y-0.5 transition-transform"></i>
            </button>
        </div>

        <!-- Right: Base64 -->
        <div class="flex-1 flex flex-col gap-3 min-h-0 relative">
            <div class="flex justify-between items-center shrink-0">
                <label class="text-xs font-bold text-zinc-400 uppercase tracking-widest text-[#00f2fe]">Base64 Format</label>
                <button onclick="clearText('base64-input')" class="text-xs text-zinc-500 hover:text-red-400 transition-colors"><i class="ph ph-trash"></i> Clear</button>
            </div>
            <textarea id="base64-input" class="code-area flex-1 border-[#00f2fe]/20" placeholder="Nhập chuỗi Base64 vào đây..."></textarea>
            <button onclick="copyText('base64-input')" class="absolute bottom-4 right-4 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 p-2 rounded-lg transition-colors" title="Copy"><i class="ph ph-copy"></i></button>
        </div>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-zinc-800 border border-zinc-700 text-white px-4 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2">
        <i class="ph-fill ph-check-circle text-emerald-400"></i>
        <span id="toast-msg">Đã copy</span>
    </div>

    <script>
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.innerHTML = isError ? `<i class="ph-fill ph-warning text-red-400"></i><span>${msg}</span>` : `<i class="ph-fill ph-check-circle text-emerald-400"></i><span>${msg}</span>`;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function encode() {
            const plain = document.getElementById('plain-input').value;
            if(!plain) return;
            try {
                // Support unicode characters
                const utf8 = new TextEncoder().encode(plain);
                const base64 = btoa(String.fromCharCode(...utf8));
                document.getElementById('base64-input').value = base64;
            } catch (e) {
                showToast('Lỗi khi mã hóa', true);
            }
        }

        function decode() {
            const base64 = document.getElementById('base64-input').value.trim();
            if(!base64) return;
            try {
                const binStr = atob(base64);
                const bytes = new Uint8Array(binStr.length);
                for (let i = 0; i < binStr.length; i++) {
                    bytes[i] = binStr.charCodeAt(i);
                }
                const decoded = new TextDecoder('utf-8').decode(bytes);
                document.getElementById('plain-input').value = decoded;
            } catch (e) {
                showToast('Chuỗi Base64 không hợp lệ', true);
            }
        }

        function clearText(id) {
            document.getElementById(id).value = '';
        }

        async function copyText(id) {
            const text = document.getElementById(id).value;
            if(!text) return;
            try {
                await navigator.clipboard.writeText(text);
                showToast('Đã copy vào clipboard!');
            } catch (err) {
                showToast('Không thể copy', true);
            }
        }
    </script>
</body>
</html>
