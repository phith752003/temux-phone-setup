worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_names_hash_bucket_size 64;

    sendfile        on;
    keepalive_timeout  65;

    # Cấu hình website tĩnh phith.click (Personal Site)
    server {
        listen       8080;
        server_name  phith.click www.phith.click localhost;

        location / {
            root   /data/data/com.termux/files/home/homelab/websites/phideptrai/public;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /data/data/com.termux/files/usr/share/nginx/html;
        }
    }

    # Cấu hình PhiTools (Multi-tool Hub)
    server {
        listen       8080;
        server_name  tools.phith.click;

        location / {
            root   /data/data/com.termux/files/home/homelab/websites/phitools/public;
            index  index.html index.htm;
            try_files $uri $uri/ =404;
        }
    }

    # Cấu hình Programmatic SEO (So sánh phần mềm)
    server {
        listen       8080;
        server_name  compare.phith.click;

        location / {
            root   /data/data/com.termux/files/home/homelab/websites/compare/public;
            index  index.html index.htm;
            try_files $uri $uri/ =404;
        }
    }

    # Cấu hình ShortLink SaaS
    server {
        listen       8080;
        server_name  s.phith.click;

        # Static Frontend
        location / {
            root   /data/data/com.termux/files/home/homelab/websites/url-shortener/public;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API Backend Routing
        location /api/ {
            proxy_pass   http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Redirect Short codes
        location ~ ^/[a-zA-Z0-9]+$ {
            proxy_pass   http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Cấu hình API Private (Homelab Control)
    server {
        listen       8080;
        server_name  api.phith.click homelab.phith.click;

        location / {
            proxy_pass   http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
